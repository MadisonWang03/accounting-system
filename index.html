<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>每日记账</title>

<!-- iPhone 添加到主屏幕：全屏 App 效果 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日记账">
<meta name="theme-color" content="#4f7cff">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<script>
  // 尽早应用主题，避免刷新瞬间闪白
  (function(){
    var t = localStorage.getItem('theme');
    if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #8a8f99;
    --accent: #4f7cff;
    --danger: #ff5a5f;
    --line: #ececf0;
    --input-bg: #fafbfc;
    --chip: #f2f3f7;
    --chip-active: #ffffff;
    --icon-bg: #eef2ff;
    --income-bg: #e7f8ef;
    --track: #eef0f4;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  [data-theme="dark"] {
    --bg: #15171c;
    --card: #1f232b;
    --text: #f0f1f3;
    --muted: #9aa0ab;
    --accent: #5d86ff;
    --danger: #ff6b70;
    --line: #2e333d;
    --input-bg: #262b33;
    --chip: #2a2f38;
    --chip-active: #3a414d;
    --icon-bg: #2b3242;
    --income-bg: #213528;
    --track: #2a2f38;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
  }
  .wrap {
    max-width: 480px; margin: 0 auto;
    padding: 0 calc(16px + env(safe-area-inset-left)) 0 calc(16px + env(safe-area-inset-right));
  }

  header {
    padding: calc(28px + env(safe-area-inset-top)) 0 18px;
    text-align: center;
    position: relative;
  }
  .theme-toggle {
    position: absolute; right: 0; top: calc(24px + env(safe-area-inset-top));
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--chip); font-size: 18px; cursor: pointer; user-select: none;
  }
  .theme-toggle:active { transform: scale(0.92); }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header .date { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* 总览卡 */
  .summary {
    background: linear-gradient(135deg, #4f7cff, #6a5cff);
    color: #fff;
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
  }
  .summary .label { font-size: 13px; opacity: 0.85; }
  .summary .amount { font-size: 34px; font-weight: 700; margin-top: 6px; letter-spacing: -1px; }
  .summary .sub {
    display: flex; justify-content: space-between;
    margin-top: 18px; font-size: 13px; opacity: 0.9;
  }
  .summary .sub span b { display: block; font-size: 16px; font-weight: 600; margin-top: 2px; }

  /* 预算卡 */
  .budget-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; margin-top: 16px; box-shadow: var(--shadow);
  }
  .budget-top { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; }
  .edit-budget {
    font-size: 12px; font-weight: 400; color: var(--muted); cursor: pointer;
    background: var(--chip); padding: 5px 10px; border-radius: 8px;
  }
  .budget-bar { height: 10px; border-radius: 6px; background: var(--track); overflow: hidden; margin: 12px 0 8px; }
  .budget-bar i { display: block; height: 100%; width: 0; border-radius: 6px; background: #2eb872; transition: width .3s, background .3s; }
  .budget-bar.warn i { background: #ffb22e; }
  .budget-bar.over i { background: var(--danger); }
  .budget-note { font-size: 12.5px; color: var(--muted); }
  .budget-note.warn { color: #d98a00; font-weight: 500; }
  .budget-note.over { color: var(--danger); font-weight: 600; }

  /* 搜索 / 筛选 */
  .filter-bar { display: flex; gap: 8px; margin: 0 0 12px; }
  .filter-bar #searchInput { flex: 1; font-size: 14px; padding: 10px 12px; }
  .filter-cat { width: auto; min-width: 92px; font-size: 14px; padding: 10px 12px; cursor: pointer; }
  .filter-result { font-size: 13px; color: var(--accent); font-weight: 600; margin: 0 4px 10px; }

  /* 输入区 */
  .add-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 16px;
    box-shadow: var(--shadow);
  }
  .row { display: flex; gap: 10px; }
  input, select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 13px 14px;
    font-size: 16px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); background: var(--card); }
  .cats { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .cat {
    flex: 1 1 auto;
    text-align: center;
    padding: 9px 0;
    border-radius: 10px;
    background: var(--chip);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: all .15s;
    min-width: 56px;
  }
  .cat.active { background: var(--accent); color: #fff; }
  button.add {
    width: 100%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 4px;
  }
  button.add:active { transform: scale(0.99); opacity: 0.9; }

  /* 列表 */
  .list-head {
    display: flex; justify-content: space-between; align-items: center;
    margin: 24px 4px 10px;
  }
  .list-head h2 { font-size: 15px; margin: 0; }
  .list-head .clear { font-size: 13px; color: var(--muted); cursor: pointer; }
  .tools { display: flex; gap: 6px; flex-wrap: wrap; }
  .tool {
    font-size: 12px; color: var(--text); cursor: pointer;
    background: var(--card); border: 1px solid var(--line);
    padding: 6px 10px; border-radius: 8px; box-shadow: var(--shadow);
  }
  .tool:active { background: var(--chip); }

  .day-group { margin-bottom: 16px; }
  .day-label {
    font-size: 12px; color: var(--muted);
    margin: 0 4px 8px; display: flex; justify-content: space-between;
  }
  .item {
    display: flex; align-items: center;
    background: var(--card);
    border-radius: 14px;
    padding: 13px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .item.edit-item { cursor: pointer; }
  .item.edit-item:active { background: var(--chip); }
  .item .icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--icon-bg); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-right: 12px; flex-shrink: 0;
  }
  .item .meta { flex: 1; min-width: 0; }
  .item .meta .name { font-size: 15px; font-weight: 500; }
  .item .meta .time { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .item .amt { font-size: 16px; font-weight: 600; }
  .item .amt.plus { color: #2eb872; }
  .item .icon.income { background: var(--income-bg); }
  .item .del {
    margin-left: 12px; color: var(--muted); cursor: pointer;
    font-size: 18px; padding: 4px;
  }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }

  /* 选项卡 */
  .tabs {
    display: flex; gap: 6px;
    background: var(--chip); border-radius: 12px; padding: 4px;
    margin: 24px 0 14px;
  }
  .tab {
    flex: 1; text-align: center; padding: 9px 0;
    font-size: 14px; border-radius: 9px; cursor: pointer;
    color: var(--muted); transition: all .15s;
  }
  .tab.active { background: var(--chip-active); color: var(--text); font-weight: 600; box-shadow: var(--shadow); }

  /* 月度总结卡 */
  .month-card {
    background: var(--card); border-radius: var(--radius);
    padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .month-card .top {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
  }
  .month-card .top .m { font-size: 15px; font-weight: 600; }
  .month-card .top .m small { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
  .month-card .top .total { font-size: 20px; font-weight: 700; }
  .bar { display: flex; height: 8px; border-radius: 5px; overflow: hidden; margin-bottom: 14px; background: var(--track); }
  .bar i { display: block; height: 100%; }
  .breakdown { display: flex; flex-direction: column; gap: 9px; }
  .brk-row { display: flex; align-items: center; font-size: 13px; }
  .brk-row .dot { width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  .brk-row .k { flex: 1; }
  .brk-row .pct { color: var(--muted); margin: 0 10px; }
  .brk-row .v { font-weight: 600; }
  .pie-wrap { display: flex; justify-content: center; margin: 6px 0 16px; }
  .pie-wrap svg { width: 150px; height: 150px; }
  .pie-center-total { font-size: 15px; font-weight: 700; fill: var(--text); }
  .pie-center-label { font-size: 9px; fill: var(--muted); }
  .pie-bg { stroke: var(--track); }
  .brk-row .v.plus { color: #2eb872; }
  .inc-section { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .inc-head { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; font-weight: 600; margin-bottom: 10px; }
  .inc-head .inc-total { color: #2eb872; }
  .net-row { margin-top: 12px; font-size: 13px; color: var(--muted); text-align: right; }
  .net-row b { color: var(--text); font-size: 15px; margin-left: 4px; }

  /* 币种切换 */
  .cur-switch {
    display: inline-flex; gap: 4px; margin-top: 12px;
    background: var(--chip); border-radius: 10px; padding: 3px;
  }
  .cur-switch span {
    padding: 5px 14px; font-size: 12px; border-radius: 8px;
    color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .cur-switch span.active { background: #fff; color: var(--text); font-weight: 600; box-shadow: var(--shadow); }

  /* 工资 / 剩余 */
  .summary .label { display: flex; align-items: center; justify-content: space-between; }
  .edit-salary {
    font-size: 12px; opacity: 0.9; cursor: pointer;
    background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 8px;
  }
  .summary .sub span b { font-size: 14px; }
  .prog { height: 6px; border-radius: 4px; background: rgba(255,255,255,0.25); margin-top: 14px; overflow: hidden; }
  .prog i { display: block; height: 100%; background: #fff; border-radius: 4px; transition: width .3s; width: 0; }
  .amount.over { color: #ffe08a; }

  /* 货币选择 */
  .cur-select {
    margin-top: 12px; border: 1px solid var(--line); background: var(--card);
    border-radius: 10px; padding: 7px 12px; font-size: 13px; color: var(--text);
    outline: none; cursor: pointer; -webkit-appearance: none; appearance: none;
    text-align: center; text-align-last: center;
  }

  /* 环比徽标 */
  .mom { font-size: 12px; margin-top: 4px; font-weight: 500; }
  .mom.up { color: var(--danger); }
  .mom.down { color: #2eb872; }
  .mom.flat { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="theme-toggle" id="themeToggle" title="切换深色 / 浅色">🌙</div>
    <h1>每日记账</h1>
    <div class="date" id="todayDate"></div>
    <select id="curSelect" class="cur-select"></select>
  </header>

  <div class="summary">
    <div class="label">当前余额 <span class="edit-salary" id="editSalary">加收入 ＋</span></div>
    <div class="amount" id="remain">0円</div>
    <div class="prog"><i id="progBar"></i></div>
    <div class="sub">
      <span>累计工资<b id="salaryShow">0円</b></span>
      <span style="text-align:center">本月已花<b id="monthTotal">0円</b></span>
      <span style="text-align:right">今日已花<b id="todayTotal">0円</b></span>
    </div>
  </div>

  <div class="budget-card" id="budgetCard">
    <div class="budget-top">
      <span id="budgetLabel">本月预算</span>
      <span class="edit-budget" id="editBudget">设置预算 ✎</span>
    </div>
    <div class="budget-bar" id="budgetBarWrap"><i id="budgetBar"></i></div>
    <div class="budget-note" id="budgetNote">还没设预算,点右上角设置一个,帮你管住手 💪</div>
  </div>

  <div class="add-card">
    <div class="row">
      <input type="number" id="amount" placeholder="金额" inputmode="decimal" step="0.01">
      <input type="text" id="note" placeholder="备注（可选）">
    </div>
    <div class="cats" id="cats"></div>
    <button class="add" id="addBtn">＋ 记一笔</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="detail">消费明细</div>
    <div class="tab" data-tab="monthly">月度总结</div>
  </div>

  <div id="detailView">
    <div class="list-head">
      <div class="tools">
        <span class="tool" id="backupBtn">⬇️ 备份</span>
        <span class="tool" id="restoreBtn">⬆️ 恢复</span>
        <span class="tool" id="csvBtn">📄 导出Excel</span>
      </div>
      <span class="clear" id="clearAll">清空</span>
    </div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍 搜索备注 / 分类…">
      <select id="filterCat" class="filter-cat"></select>
    </div>
    <div id="list"></div>
    <input type="file" id="restoreFile" accept=".json,application/json" style="display:none">
  </div>

  <div id="monthlyView" style="display:none">
    <div id="monthlyList"></div>
  </div>
</div>

<script>
const CATS = [
  { key: '餐饮', icon: '🍜', color: '#ff8a4f' },
  { key: '交通', icon: '🚇', color: '#4f7cff' },
  { key: '购物', icon: '🛍️', color: '#ff5a8a' },
  { key: '居住', icon: '🏠', color: '#3ec98a' },
  { key: '娱乐', icon: '🎮', color: '#a85cff' },
  { key: '其他', icon: '📌', color: '#8a8f99' },
];
const colorOf = k => (CATS.find(c => c.key === k) || {}).color || '#8a8f99';

// 收入分类
const INCOME_CATS = [
  { key: '工资', icon: '💴', color: '#2eb872' },
  { key: '奖金', icon: '🎁', color: '#f5a623' },
  { key: '兼职', icon: '🛠️', color: '#4f7cff' },
  { key: '投资', icon: '📈', color: '#a85cff' },
  { key: '红包', icon: '🧧', color: '#ff5a5f' },
  { key: '其他', icon: '➕', color: '#8a8f99' },
];
const incInfo = k => INCOME_CATS.find(c => c.key === k) || INCOME_CATS[0];
const incatOf = r => r.incat || '工资'; // 兼容旧记录

let selectedCat = '餐饮';
let records = JSON.parse(localStorage.getItem('expenses') || '[]');
// 支持的货币：symbol 符号 / dec 小数位 / after 符号是否放在数字后 / label 名称
const CURRENCIES = {
  JPY: { symbol: '円', dec: 0, after: true,  label: '日元 JPY' },
  CNY: { symbol: '¥',  dec: 2, after: false, label: '人民币 CNY' },
  USD: { symbol: '$',  dec: 2, after: false, label: '美元 USD' },
  EUR: { symbol: '€',  dec: 2, after: false, label: '欧元 EUR' },
  GBP: { symbol: '£',  dec: 2, after: false, label: '英镑 GBP' },
  KRW: { symbol: '₩',  dec: 0, after: false, label: '韩元 KRW' },
  HKD: { symbol: 'HK$',dec: 2, after: false, label: '港币 HKD' },
  TWD: { symbol: 'NT$',dec: 0, after: false, label: '新台币 TWD' },
  SGD: { symbol: 'S$', dec: 2, after: false, label: '新加坡元 SGD' },
  AUD: { symbol: 'A$', dec: 2, after: false, label: '澳元 AUD' },
  CAD: { symbol: 'C$', dec: 2, after: false, label: '加元 CAD' },
  THB: { symbol: '฿',  dec: 2, after: false, label: '泰铢 THB' },
  MYR: { symbol: 'RM', dec: 2, after: false, label: '马来西亚 MYR' },
  PHP: { symbol: '₱',  dec: 2, after: false, label: '菲律宾 PHP' },
  VND: { symbol: '₫',  dec: 0, after: true,  label: '越南盾 VND' },
  INR: { symbol: '₹',  dec: 2, after: false, label: '印度卢比 INR' },
};
let currency = localStorage.getItem('currency') || 'JPY';
if (!CURRENCIES[currency]) currency = 'JPY';
const curInfo = () => CURRENCIES[currency];

let budget = Number(localStorage.getItem('budget') || 0);
let searchText = '';
let filterCat = '全部';

const $ = id => document.getElementById(id);
const fmt = n => {
  const c = curInfo();
  const neg = Number(n) < 0 ? '-' : '';
  const num = Math.abs(Number(n)).toLocaleString('en-US', { minimumFractionDigits: c.dec, maximumFractionDigits: c.dec });
  return neg + (c.after ? num + c.symbol : c.symbol + num);
};
const iconOf = k => (CATS.find(c => c.key === k) || {}).icon || '📌';

function save() { localStorage.setItem('expenses', JSON.stringify(records)); }

function renderCats() {
  $('cats').innerHTML = CATS.map(c =>
    `<div class="cat ${c.key === selectedCat ? 'active' : ''}" data-k="${c.key}">${c.icon} ${c.key}</div>`
  ).join('');
  document.querySelectorAll('.cat').forEach(el => {
    el.onclick = () => { selectedCat = el.dataset.k; renderCats(); };
  });
}

function dayKey(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function timeOf(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function render() {
  const now = new Date();
  const todayK = dayKey(now.getTime());
  const monthPrefix = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  let todaySum = 0, monthSum = 0, totalIncome = 0, totalExpense = 0;
  records.forEach(r => {
    const k = dayKey(r.ts);
    if (r.type === 'income') {
      totalIncome += r.amount;
    } else {
      totalExpense += r.amount;
      if (k === todayK) todaySum += r.amount;
      if (k.startsWith(monthPrefix)) monthSum += r.amount;
    }
  });
  $('todayTotal').textContent = fmt(todaySum);
  $('monthTotal').textContent = fmt(monthSum);
  $('salaryShow').textContent = fmt(totalIncome);

  // 当前余额 = 累计工资 - 累计支出（会滚动到下月）
  const balance = totalIncome - totalExpense;
  $('remain').textContent = fmt(balance);
  $('remain').classList.toggle('over', balance < 0);
  // 进度条:已用掉收入的比例
  const pct = totalIncome > 0 ? Math.min(totalExpense / totalIncome * 100, 100) : 0;
  $('progBar').style.width = pct + '%';
  $('progBar').style.background = balance < 0 ? '#ffe08a' : '#fff';

  // 预算提醒（本月支出 vs 预算）
  renderBudget(monthSum);

  // 搜索 / 分类筛选
  const q = searchText.trim().toLowerCase();
  const matches = r => {
    const isInc = r.type === 'income';
    const catName = isInc ? incatOf(r) : r.cat;
    if (filterCat !== '全部') {
      if (filterCat === '收入') { if (!isInc) return false; }
      else if (isInc || catName !== filterCat) return false;
    }
    if (q && !((r.note || '').toLowerCase().includes(q) || catName.toLowerCase().includes(q)
        || (isInc && '收入'.includes(q)))) return false;
    return true;
  };
  const filtered = records.filter(matches);

  // 按天分组
  const groups = {};
  [...filtered].sort((a,b) => b.ts - a.ts).forEach(r => {
    const k = dayKey(r.ts);
    (groups[k] = groups[k] || []).push(r);
  });

  const keys = Object.keys(groups);
  if (keys.length === 0) {
    const hasFilter = q || filterCat !== '全部';
    $('list').innerHTML = '<div class="empty">' +
      (records.length === 0 ? '还没有记账，记下第一笔吧 ✏️' :
       hasFilter ? '没有符合条件的记录 🔍' : '还没有记账，记下第一笔吧 ✏️') + '</div>';
    if ($('monthlyView').style.display !== 'none') renderMonthly();
    return;
  }

  $('list').innerHTML = keys.map(k => {
    const daySpend = groups[k].reduce((s, r) => s + (r.type === 'income' ? 0 : r.amount), 0);
    const label = k === todayK ? '今天' : k;
    const items = groups[k].map(r => {
      if (r.type === 'income') {
        const ic = incatOf(r);
        return `<div class="item edit-item" data-edit="${r.ts}">
          <div class="icon income">${incInfo(ic).icon}</div>
          <div class="meta">
            <div class="name">${ic}${r.note ? ' · ' + escapeHtml(r.note) : ''}</div>
            <div class="time">${timeOf(r.ts)} · 点击修改</div>
          </div>
          <div class="amt plus">+${fmt(r.amount)}</div>
          <div class="del" data-id="${r.ts}">✕</div>
        </div>`;
      }
      return `<div class="item edit-item" data-edit="${r.ts}">
        <div class="icon">${iconOf(r.cat)}</div>
        <div class="meta">
          <div class="name">${r.cat}${r.note ? ' · ' + escapeHtml(r.note) : ''}</div>
          <div class="time">${timeOf(r.ts)} · 点击修改</div>
        </div>
        <div class="amt">${fmt(r.amount)}</div>
        <div class="del" data-id="${r.ts}">✕</div>
      </div>`;
    }).join('');
    return `<div class="day-group">
      <div class="day-label"><span>${label}</span><span>支出 ${fmt(daySpend)}</span></div>
      ${items}
    </div>`;
  }).join('');

  // 筛选时顶部显示「共 N 笔 · 合计」
  if (q || filterCat !== '全部') {
    const spendSum = filtered.reduce((s, r) => s + (r.type === 'income' ? 0 : r.amount), 0);
    const banner = `<div class="filter-result">共 ${filtered.length} 笔${filterCat !== '全部' && filterCat !== '收入' ? ' · 支出合计 ' + fmt(spendSum) : ''}</div>`;
    $('list').innerHTML = banner + $('list').innerHTML;
  }

  document.querySelectorAll('.del').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      records = records.filter(r => String(r.ts) !== el.dataset.id);
      save(); render();
    };
  });

  document.querySelectorAll('.edit-item').forEach(el => {
    el.onclick = () => editRecord(el.dataset.edit);
  });

  if ($('monthlyView').style.display !== 'none') renderMonthly();
}

// 预算提醒
function renderBudget(monthSum) {
  const bar = $('budgetBar'), wrap = $('budgetBarWrap'), note = $('budgetNote');
  if (!budget || budget <= 0) {
    $('budgetLabel').textContent = '本月预算';
    $('editBudget').textContent = '设置预算 ✎';
    bar.style.width = '0%';
    wrap.className = 'budget-bar';
    note.className = 'budget-note';
    note.textContent = '还没设预算，点右上角设置一个，帮你管住手 💪';
    return;
  }
  $('editBudget').textContent = '修改预算 ✎';
  const ratio = monthSum / budget;
  const left = budget - monthSum;
  bar.style.width = Math.min(ratio * 100, 100) + '%';
  $('budgetLabel').textContent = '本月预算 ' + fmt(budget);
  if (ratio >= 1) {
    wrap.className = 'budget-bar over';
    note.className = 'budget-note over';
    note.textContent = `⚠️ 已超支 ${fmt(monthSum - budget)}（已花 ${fmt(monthSum)}）`;
  } else if (ratio >= 0.8) {
    wrap.className = 'budget-bar warn';
    note.className = 'budget-note warn';
    note.textContent = `快到上限了！已花 ${fmt(monthSum)}，还剩 ${fmt(left)}（${Math.round(ratio*100)}%）`;
  } else {
    wrap.className = 'budget-bar';
    note.className = 'budget-note';
    note.textContent = `已花 ${fmt(monthSum)}，还剩 ${fmt(left)}（${Math.round(ratio*100)}%）`;
  }
}

// 修改一笔记录（金额 + 备注）
function editRecord(id) {
  const r = records.find(x => String(x.ts) === String(id));
  if (!r) return;
  const isIncome = r.type === 'income';
  const label = isIncome ? incatOf(r) : r.cat;
  const a = prompt(`修改「${label}」的金额：`, r.amount);
  if (a === null) return;
  const v = parseFloat(a);
  if (isNaN(v) || v <= 0) { alert('请输入有效金额'); return; }
  const note = prompt('修改备注（可留空）：', r.note || '');
  if (note === null) return;
  r.amount = roundCur(v);
  r.note = note.trim();
  save(); render();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addRecord() {
  const amount = parseFloat($('amount').value);
  if (!amount || amount <= 0) { $('amount').focus(); return; }
  records.push({
    ts: Date.now(),
    amount: roundCur(amount),
    cat: selectedCat,
    note: $('note').value.trim(),
  });
  save();
  $('amount').value = '';
  $('note').value = '';
  $('amount').focus();
  render();
}

function monthLabel(prefix) {
  const [y, m] = prefix.split('-');
  return y + '年' + Number(m) + '月';
}

function renderMonthly() {
  // 按月份聚合（支出 + 收入分开统计）
  const months = {};
  records.forEach(r => {
    const d = new Date(r.ts);
    const prefix = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!months[prefix]) months[prefix] = { total: 0, count: 0, cats: {}, incTotal: 0, incCats: {} };
    if (r.type === 'income') {
      const ic = incatOf(r);
      months[prefix].incTotal += r.amount;
      months[prefix].incCats[ic] = (months[prefix].incCats[ic] || 0) + r.amount;
    } else {
      months[prefix].total += r.amount;
      months[prefix].count++;
      months[prefix].cats[r.cat] = (months[prefix].cats[r.cat] || 0) + r.amount;
    }
  });

  const keys = Object.keys(months).sort().reverse();
  const nowPrefix = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0');

  if (keys.length === 0) {
    $('monthlyList').innerHTML = '<div class="empty">还没有记录,记账后这里会按月自动总结 📊</div>';
    return;
  }

  $('monthlyList').innerHTML = keys.map(k => {
    const m = months[k];
    const isNow = k === nowPrefix;
    // 各分类排序
    const entries = Object.entries(m.cats).sort((a,b) => b[1] - a[1]);
    const donut = pieSVG(entries, m.total);
    const rows = entries.map(([cat, v]) => `
      <div class="brk-row">
        <span class="dot" style="background:${colorOf(cat)}"></span>
        <span class="k">${iconOf(cat)} ${cat}</span>
        <span class="pct">${(v/m.total*100).toFixed(0)}%</span>
        <span class="v">${fmt(v)}</span>
      </div>`).join('');
    // 环比上月
    const [py, pm] = k.split('-').map(Number);
    const prevDate = new Date(py, pm - 2, 1);
    const prevKey = prevDate.getFullYear() + '-' + String(prevDate.getMonth()+1).padStart(2,'0');
    const prev = months[prevKey];
    let momHtml = '';
    if (prev && prev.total > 0) {
      const diff = m.total - prev.total;
      const pct = (diff / prev.total * 100);
      const cls = diff > 0 ? 'up' : (diff < 0 ? 'down' : 'flat');
      const arrow = diff > 0 ? '↑' : (diff < 0 ? '↓' : '–');
      const word = diff > 0 ? '多花' : (diff < 0 ? '少花' : '持平');
      momHtml = `<div class="mom ${cls}">${arrow} 较上月${word} ${fmt(Math.abs(diff))}（${Math.abs(pct).toFixed(0)}%）</div>`;
    } else {
      momHtml = `<div class="mom flat">无上月数据可对比</div>`;
    }
    // 收入分类统计
    const incEntries = Object.entries(m.incCats).sort((a,b) => b[1] - a[1]);
    const incRows = incEntries.map(([cat, v]) => `
      <div class="brk-row">
        <span class="dot" style="background:${incInfo(cat).color}"></span>
        <span class="k">${incInfo(cat).icon} ${cat}</span>
        <span class="pct">${(v/m.incTotal*100).toFixed(0)}%</span>
        <span class="v plus">+${fmt(v)}</span>
      </div>`).join('');
    const incomeBlock = m.incTotal > 0 ? `
      <div class="inc-section">
        <div class="inc-head"><span>💰 本月收入</span><span class="inc-total">+${fmt(m.incTotal)}</span></div>
        <div class="breakdown">${incRows}</div>
        <div class="net-row">本月结余 <b>${fmt(m.incTotal - m.total)}</b></div>
      </div>` : '';
    return `<div class="month-card">
      <div class="top">
        <div class="m">${monthLabel(k)}${isNow ? '<small>本月·进行中</small>' : '<small>已结算</small>'}</div>
        <div class="total">${fmt(m.total)}</div>
      </div>
      ${momHtml}
      <div class="pie-wrap">${donut}</div>
      <div class="breakdown">${rows}</div>
      ${incomeBlock}
    </div>`;
  }).join('');
}

// 生成环形饼图 SVG
function pieSVG(entries, total) {
  const cx = 75, cy = 75, r = 54, C = 2 * Math.PI * r, w = 26;
  let offset = 0;
  const segs = entries.map(([cat, v]) => {
    const frac = total > 0 ? v / total : 0;
    const dash = frac * C;
    const s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colorOf(cat)}"
      stroke-width="${w}" stroke-dasharray="${dash.toFixed(2)} ${(C - dash).toFixed(2)}"
      stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    offset += dash;
    return s;
  }).join('');
  return `<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" class="pie-bg" stroke-width="${w}"></circle>
    ${segs}
    <text x="${cx}" y="${cy-2}" text-anchor="middle" class="pie-center-total">${fmt(total)}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" class="pie-center-label">本月支出</text>
  </svg>`;
}

// 选项卡切换
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const isDetail = t.dataset.tab === 'detail';
    $('detailView').style.display = isDetail ? '' : 'none';
    $('monthlyView').style.display = isDetail ? 'none' : '';
    if (!isDetail) renderMonthly();
  };
});

$('addBtn').onclick = addRecord;
$('note').addEventListener('keydown', e => { if (e.key === 'Enter') addRecord(); });
$('amount').addEventListener('keydown', e => { if (e.key === 'Enter') addRecord(); });
$('clearAll').onclick = () => {
  if (records.length && confirm('确定清空全部记账记录吗？')) { records = []; save(); render(); }
};

// 设置本月预算
$('editBudget').onclick = () => {
  const cur = budget > 0 ? budget : '';
  const input = prompt('设置每月预算（' + curInfo().symbol + '）：\n本月支出快到/超过预算时会变黄、变红提醒。\n（留空并确定可取消预算）', cur);
  if (input === null) return;
  if (input.trim() === '') { budget = 0; localStorage.removeItem('budget'); render(); return; }
  const v = parseFloat(input);
  if (isNaN(v) || v < 0) { alert('请输入有效金额'); return; }
  budget = roundCur(v);
  localStorage.setItem('budget', budget);
  render();
};

// 分类筛选下拉
$('filterCat').innerHTML =
  ['全部', ...CATS.map(c => c.key), '收入']
    .map(k => `<option value="${k}">${k === '全部' ? '全部分类' : (k === '收入' ? '💰 收入' : (iconOf(k) + ' ' + k))}</option>`)
    .join('');
$('filterCat').onchange = () => { filterCat = $('filterCat').value; render(); };
$('searchInput').addEventListener('input', () => { searchText = $('searchInput').value; render(); });

// 按当前货币的小数位取整
const roundCur = v => { const d = curInfo().dec; const p = Math.pow(10, d); return Math.round(v * p) / p; };

// 加收入（累计进余额，可选收入类型）
$('editSalary').onclick = () => {
  const input = prompt('这次收入多少？\n会直接加进当前余额，上月没花完的会保留。', '');
  if (input === null) return;
  const v = parseFloat(input);
  if (isNaN(v) || v <= 0) { alert('请输入有效金额'); return; }
  const menu = INCOME_CATS.map((c, i) => (i+1) + ' ' + c.icon + ' ' + c.key).join('\n');
  const pick = prompt('选择收入类型（输入数字）：\n' + menu, '1');
  if (pick === null) return;
  const idx = parseInt(pick, 10) - 1;
  const incat = (INCOME_CATS[idx] || INCOME_CATS[0]).key;
  const note = prompt('备注（可留空，例如「6月工资」）：', '') || '';
  records.push({ ts: Date.now(), amount: roundCur(v), type: 'income', incat, note: note.trim() });
  save();
  render();
};

// 货币选择
function applyCurrency() {
  const c = curInfo();
  $('amount').step = c.dec === 0 ? '1' : '0.01';
  $('amount').placeholder = '金额（' + c.symbol + '）';
}
$('curSelect').innerHTML = Object.entries(CURRENCIES)
  .map(([code, c]) => `<option value="${code}">${c.symbol}　${c.label}</option>`).join('');
$('curSelect').value = currency;
$('curSelect').onchange = () => {
  const next = $('curSelect').value;
  // 已有记录时，提醒切换只改符号、不换算金额
  if (next !== currency && records.length > 0) {
    const ok = confirm(
      '切换货币只会改变显示的符号，不会按汇率换算金额。\n' +
      '建议一开始就选好货币，之后一直用它记。\n\n确定要切换吗？'
    );
    if (!ok) { $('curSelect').value = currency; return; }
  }
  currency = next;
  localStorage.setItem('currency', currency);
  applyCurrency();
  render();
  if ($('monthlyView').style.display !== 'none') renderMonthly();
};
applyCurrency();

// ===== 备份 / 恢复 / 导出 =====
function downloadFile(name, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

// 备份：导出可恢复的 JSON 文件
$('backupBtn').onclick = () => {
  if (!records.length) { alert('还没有记录可备份'); return; }
  const data = { app: '每日记账', version: 1, currency, budget, records };
  downloadFile('记账备份-' + todayStr() + '.json', JSON.stringify(data, null, 2), 'application/json');
};

// 恢复：从 JSON 文件导入
$('restoreBtn').onclick = () => $('restoreFile').click();
$('restoreFile').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const list = Array.isArray(data) ? data : data.records;
      if (!Array.isArray(list)) throw new Error('格式不对');
      if (!confirm('恢复后会用备份文件「替换」当前所有记录，确定吗？')) return;
      records = list;
      if (data.currency && CURRENCIES[data.currency]) {
        currency = data.currency;
        localStorage.setItem('currency', currency);
        $('curSelect').value = currency;
        applyCurrency();
      }
      if (typeof data.budget === 'number' && data.budget > 0) {
        budget = data.budget;
        localStorage.setItem('budget', budget);
      }
      save(); render();
      alert('恢复成功，共 ' + records.length + ' 条记录');
    } catch (err) {
      alert('恢复失败：这不是有效的备份文件');
    }
    $('restoreFile').value = '';
  };
  reader.readAsText(file);
};

// 导出 Excel（CSV）
$('csvBtn').onclick = () => {
  if (!records.length) { alert('还没有记录可导出'); return; }
  const rows = [['日期', '时间', '类型', '分类', '备注', '金额']];
  [...records].sort((a,b) => a.ts - b.ts).forEach(r => {
    const d = new Date(r.ts);
    const date = dayKey(r.ts);
    const time = timeOf(r.ts);
    const isInc = r.type === 'income';
    rows.push([date, time, isInc ? '收入' : '支出', isInc ? incatOf(r) : r.cat, r.note || '', r.amount]);
  });
  const csv = rows.map(row =>
    row.map(c => {
      const s = String(c);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(',')
  ).join('\n');
  // 加 BOM，Excel 才能正确识别中文
  downloadFile('记账明细-' + todayStr() + '.csv', '﻿' + csv, 'text/csv;charset=utf-8');
};

// 深色 / 浅色切换
function applyTheme(t) {
  if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.removeAttribute('data-theme');
  $('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', t === 'dark' ? '#15171c' : '#4f7cff');
}
function currentTheme() {
  return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
}
applyTheme(currentTheme());
$('themeToggle').onclick = () => {
  const next = currentTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
};

$('todayDate').textContent = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
renderCats();
render();

// 离线支持（添加到主屏幕后无需联网）
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
